services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-curamind}
      POSTGRES_USER: ${POSTGRES_USER:-curamind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-curamind}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:6
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.django
    restart: always
    environment:
      DJANGO_ENV: ${DJANGO_ENV:-production}
      DEBUG: ${DEBUG:-False}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-False}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-False}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-curamind-local-development-secret-key-please-change}
      DATABASE_URL: postgres://${POSTGRES_USER:-curamind}:${POSTGRES_PASSWORD:-curamind}@postgres:5432/${POSTGRES_DB:-curamind}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-curamind}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://fastapi:8001}
      AI_SERVICE_TIMEOUT_SECONDS: ${AI_SERVICE_TIMEOUT_SECONDS:-120}
      AI_SERVICE_RETRY_COUNT: ${AI_SERVICE_RETRY_COUNT:-2}
      AI_SERVICE_RETRY_BACKOFF_SECONDS: ${AI_SERVICE_RETRY_BACKOFF_SECONDS:-1}
      IMAGE_PROCESSING_MAX_ATTEMPTS: ${IMAGE_PROCESSING_MAX_ATTEMPTS:-3}
      IMAGE_PROCESSING_RETRY_BACKOFF_SECONDS: ${IMAGE_PROCESSING_RETRY_BACKOFF_SECONDS:-2}
      CELERY_TASK_TRACK_STARTED: ${CELERY_TASK_TRACK_STARTED:-True}
      CELERY_TASK_ACKS_LATE: ${CELERY_TASK_ACKS_LATE:-True}
      CELERY_TASK_REJECT_ON_WORKER_LOST: ${CELERY_TASK_REJECT_ON_WORKER_LOST:-True}
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      CELERY_WORKER_MAX_TASKS_PER_CHILD: ${CELERY_WORKER_MAX_TASKS_PER_CHILD:-100}
      CELERY_TASK_SOFT_TIME_LIMIT: ${CELERY_TASK_SOFT_TIME_LIMIT:-240}
      CELERY_TASK_TIME_LIMIT: ${CELERY_TASK_TIME_LIMIT:-300}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:8000,http://127.0.0.1:8000,https://localhost,https://127.0.0.1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; import sys; sys.exit(0 if urlopen('http://127.0.0.1:8000/readyz').status == 200 else 1)\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 25s
    ports:
      - "8000:8000"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media

  fastapi:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.fastapi
    restart: always
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-curamind}
      AI_MAX_UPLOAD_MB: ${AI_MAX_UPLOAD_MB:-25}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-resnet50}
      AI_MODEL_VERSION: ${AI_MODEL_VERSION:-demo-resnet50-v1}
      AI_MODEL_REGISTRY: ${AI_MODEL_REGISTRY:-local-demo}
      AI_MODEL_WEIGHTS_SHA256: ${AI_MODEL_WEIGHTS_SHA256:-}
      AI_MODEL_ANOMALY_THRESHOLD: ${AI_MODEL_ANOMALY_THRESHOLD:-}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; import sys; sys.exit(0 if urlopen('http://127.0.0.1:8001/ready').status == 200 else 1)\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    ports:
      - "8001:8001"

  flask-utils:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.flask
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; import sys; sys.exit(0 if urlopen('http://127.0.0.1:8002/health').status == 200 else 1)\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 10s
    ports:
      - "8002:8002"

  celery:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.celery
    restart: always
    environment:
      DJANGO_ENV: ${DJANGO_ENV:-production}
      DEBUG: ${DEBUG:-False}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-False}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-False}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-curamind-local-development-secret-key-please-change}
      DATABASE_URL: postgres://${POSTGRES_USER:-curamind}:${POSTGRES_PASSWORD:-curamind}@postgres:5432/${POSTGRES_DB:-curamind}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-curamind}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://fastapi:8001}
      AI_SERVICE_TIMEOUT_SECONDS: ${AI_SERVICE_TIMEOUT_SECONDS:-120}
      AI_SERVICE_RETRY_COUNT: ${AI_SERVICE_RETRY_COUNT:-2}
      AI_SERVICE_RETRY_BACKOFF_SECONDS: ${AI_SERVICE_RETRY_BACKOFF_SECONDS:-1}
      IMAGE_PROCESSING_MAX_ATTEMPTS: ${IMAGE_PROCESSING_MAX_ATTEMPTS:-3}
      IMAGE_PROCESSING_RETRY_BACKOFF_SECONDS: ${IMAGE_PROCESSING_RETRY_BACKOFF_SECONDS:-2}
    volumes:
      - media_data:/app/media
    depends_on:
      django:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      django:
        condition: service_healthy
      fastapi:
        condition: service_healthy
      flask-utils:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/healthz > /dev/null"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  mongo_data:
  static_data:
  media_data:
